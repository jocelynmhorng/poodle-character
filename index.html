<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tia · Pixel Poodle</title>
<style>
  :root {
    --bg: #b7e1f8;
    --ink: #1a3a4a;
    --muted: #4a7a96;
    --line: rgba(40,100,150,0.18);
    --card: #d8eef8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    color: var(--ink);
    overflow: hidden;
  }
  .scene {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 280px;
    grid-template-rows: 1fr;
    grid-template-areas: 'stage  legend';
  }
  .stage { grid-area: stage; }
  .legend { grid-area: legend; padding: 24px 24px 24px 0; overflow: auto; position: relative; z-index: 1; }
  .legend-card {
    background: #ffffff;
    border-radius: 18px;
    padding: 22px 22px 24px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px rgba(60,40,20,0.08);
  }
  .legend-section + .legend-section { margin-top: 22px; }
  .legend-h {
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #9a8a76;
    margin-bottom: 8px;
  }
  .legend-now {
    font-size: 22px;
    letter-spacing: 0.04em;
    color: #111;
    font-weight: 600;
    line-height: 1.1;
  }
  .legend-note {
    font-size: 11px;
    color: #6a5a44;
    margin-top: 4px;
    letter-spacing: 0.06em;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    appearance: none;
    background: #111;
    color: #fff;
    border: 1px solid #111;
    padding: 7px 11px;
    font: inherit;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 120ms, transform 120ms;
  }
  .chip:hover { opacity: 0.85; transform: translateY(-1px); }
  .chip.active { opacity: 1; }
  @media (min-width: 721px) {
    .scene {
      grid-template-columns: 1fr;
      grid-template-areas: 'stage';
    }
    .legend {
      grid-area: unset;
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      padding: 0;
      background: transparent !important;
      overflow: visible;
      z-index: 10;
    }
    .legend-card {
      background: rgba(255,255,255,0.88) !important;
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 20px 16px;
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 24px rgba(60,40,20,0.14) !important;
      white-space: nowrap;
    }
    .legend-identity { display: none !important; }
    .legend-section + .legend-section { margin-top: 14px; }
  }
  @media (max-width: 720px) {
    .scene {
      grid-template-columns: 1fr;
      grid-template-areas: 'stage' 'legend';
      grid-template-rows: 1fr auto;
    }
    .legend { padding: 0 16px 16px; }
  }

  @media (min-width: 768px) {
    .top-badge { display: none; }
    .badge-size { display: inline; }
  }

  @media (max-width: 480px) {
    .top-badge {
      max-width: 80%;
    }
    .badge-size { display: none; }
    .legend-identity { display: none !important; }
    .legend {
      padding: 0;
      width: 100%;
    }
    .legend-card {
      border-radius: 20px 20px 0 0;
      padding: 18px 20px 28px;
    }
    .id-name    { font-size: 21px; }
    .id-meta    { font-size: 10px; letter-spacing: 0.18em; }
    .legend-h   { font-size: 10px; letter-spacing: 0.2em; margin-bottom: 6px; }
    .legend-now { font-size: 16px; }
    .legend-note{ font-size: 10px; }
    .chip       { font-size: 10px; padding: 6px 10px; }
  }

  .id-row { display: block; line-height: 1.05; }
  .id-name {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #111;
    margin-bottom: 8px;
  }
  .id-meta {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #6a5a44;
  }
  .id-meta + .id-meta { margin-top: 4px; }

  /* time-of-day tint overlay */
  .tod-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
    transition: background 600ms ease, opacity 600ms ease;
    mix-blend-mode: multiply;
    opacity: 0;
  }
  .stage.tod-golden .tod-overlay { background: #f4b266; opacity: 0.42; }
  .stage.tod-dusk   .tod-overlay { background: #6a4a78; opacity: 0.55; }
  .stage.tod-night  .tod-overlay { background: #1d2a52; opacity: 0.72; }

  /* main stage */
  .stage {
    position: relative;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .floor {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom, transparent 0%, transparent 65%, rgba(170,120,70,0.18) 65.01%, rgba(170,120,70,0.05) 100%);
    pointer-events: none;
  }
  @media (max-width: 480px) {
    .floor {
      background:
        linear-gradient(to bottom, transparent 0%, transparent 50%, rgba(170,120,70,0.18) 50.01%, rgba(170,120,70,0.05) 100%);
    }
  }
  canvas#dog, canvas#bg {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  canvas#bg { position: fixed; inset: 0; width: 100%; height: 100%; }
  canvas#dog { position: relative; z-index: 2; }
  .ticker { z-index: 3; }
  .label { z-index: 3; }
  .stage.mothersday #floor, .stage.horses #floor { display: none; }
  body.mothersday { background: #fadadd; }
  body.horses { background: #a4d8ee; }
  .label {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .top-badge {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: rgba(255, 255, 255, 0.88);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 7px 18px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 4px 16px rgba(60,40,20,0.12);
    white-space: nowrap;
  }
  .badge-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #3a2010;
  }
  .badge-divider {
    color: #b09070;
    font-size: 12px;
  }
  .badge-meta {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6a5a44;
  }
  .badge-pipe {
    margin: 0 5px;
    color: #c0a880;
  }
  .badge-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .badge-credit {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9a8a74;
    gap: 0;
  }
  .badge-link {
    color: #9a8a74;
    text-decoration: none;
  }
  .badge-link:hover {
    color: #3a2010;
  }

  .legend-modes-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #9a8a76;
    margin-bottom: 10px;
    text-align: center;
  }
  @media (max-width: 720px) {
    .legend-modes-label { display: none; }
  }

  .legend-card { position: relative; }

  .ticker {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    user-select: none;
  }
  .ticker em {
    font-style: normal;
    color: #6a4a2a;
    margin-left: 8px;
    letter-spacing: 0.22em;
  }
</style>
</head>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport)
      : null;
    if (ro) { ro.observe(document.documentElement); return () => ro.disconnect(); }
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      {!open && (
        <button className="twk-btn-trigger" onClick={() => setOpen(true)}>
          Tweaks
        </button>
      )}
      {open && (
        <>
          <div className="twk-backdrop" onClick={() => setOpen(false)} />
          <div ref={dragRef} className="twk-panel"
               style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks"
                      onMouseDown={(e) => e.stopPropagation()}
                      onClick={() => setOpen(false)}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      )}
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <TweakRow label={label} inline>
      <button className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}>
        <i />
      </button>
    </TweakRow>
  );
}

const cv = document.getElementById('dog');

function fitCanvas() {
  const stage = document.querySelector('.stage');
  const r = stage.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.style.width = r.width + 'px';
  cv.style.height = r.height + 'px';
  cv.width = Math.floor(r.width * dpr);
  cv.height = Math.floor(r.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

function drawSprite(sprite, cx, cy, scale, tr) {
  ctx.save();
  ctx.translate(cx + (tr.dx||0), cy + (tr.dy||0));
  if (tr.rotate) ctx.rotate(tr.rotate);
  ctx.scale((tr.scaleX != null ? tr.scaleX : 1), (tr.scaleY != null ? tr.scaleY : 1));
  ctx.translate(-W*scale/2, -H*scale/2);
  const pal = currentPal();
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const c = pal[sprite[y*W + x]];
      if (!c) continue;
      ctx.fillStyle = c;
      ctx.fillRect(x*scale, y*scale, scale, scale);
    }
  }
  ctx.restore();
}

function drawShadow(cx, cy, scale, squish) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(1, 0.32);
  ctx.fillStyle = 'rgba(50, 28, 12, 0.28)';
  ctx.beginPath();
  ctx.ellipse(0, 0, scale * 6.5 * squish, scale * 3.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function px(c, x, y, w, h, color) {
  c.fillStyle = color;
  c.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawHeart(c, x, y, p, color) {
  // 7-wide × 6-tall pixel heart
  const shape = [
    '.XX.XX.',
    'XXXXXXX',
    'XXXXXXX',
    '.XXXXX.',
    '..XXX..',
    '...X...',
  ];
  for (let r = 0; r < shape.length; r++) {
    for (let col = 0; col < shape[r].length; col++) {
      if (shape[r][col] === 'X') px(c, x + col*p, y + r*p, p, p, color);
    }
  }
}

function drawMomFlower(c, x, y, p, color) {
  // pink-toned flower with white center
  px(c, x+p, y+2*p, p, 3*p, '#e8a0b0'); // stem
  px(c, x, y+3*p, p, p, '#f4bfcf');      // left leaf
  px(c, x+2*p, y+3*p, p, p, '#f4bfcf'); // right leaf
  px(c, x+p, y, p, p, color);
  px(c, x, y+p, p, p, color);
  px(c, x+2*p, y+p, p, p, color);
  px(c, x+p, y+2*p, p, p, '#fff5f8');   // center white
  px(c, x+p, y+p, p, p, '#fff5f8');
}

function drawHorse(c, x, y, p, dark) {
  const A = dark ? '#3d2a1c' : '#7a5a3a';
  const M = '#1a1008';
  const shape = [
    '......AA',
    '..AAAAAA',
    'AAAAAAAA',
    'AAAAAAAA',
    'A.AA.AA.',
    'A.AA.AA.',
  ];
  for (let r=0; r<shape.length; r++) {
    for (let cc=0; cc<shape[r].length; cc++) {
      if (shape[r][cc]==='A') px(c, x+cc*p, y+r*p, p, p, A);
    }
  }
  px(c, x+5*p, y+p, p, p, M);
  px(c, x+6*p, y, p, p, M);
  px(c, x, y+2*p, p, p, M);
  px(c, x, y+3*p, p, p, M);
  px(c, x+7*p, y+p+1, 1, 1, '#000');
}

let bgMode = 'room';
let bgT0 = performance.now();

function drawBackground() {
  const w = window.innerWidth, h = window.innerHeight;
  bgCtx.clearRect(0, 0, w, h);
  if (bgMode === 'room') return;

  const t = (performance.now() - bgT0) / 1000;
  const p = Math.max(4, Math.floor(h / 70));
  const mobileShift = window.innerWidth <= 480 ? h * 0.15 : 0;

  // Pre-fill full canvas with ground color so mobileShift translate leaves no gap at bottom
  bgCtx.fillStyle = bgMode === 'mothersday' ? '#f48fb1' : '#5fa843';
  bgCtx.fillRect(0, 0, w, h);

  if (mobileShift) { bgCtx.save(); bgCtx.translate(0, -mobileShift); }

  if (bgMode === 'mothersday') {
    // gradient anchored to canvas edges — starts at mobileShift so pure start color shows at canvas top
    const grad = bgCtx.createLinearGradient(0, mobileShift, 0, h + mobileShift);
    grad.addColorStop(0, '#fce4ec');
    grad.addColorStop(1, '#f8bbd0');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, -mobileShift, w, h + 2 * mobileShift);

    // soft pink ground strip — extend down to cover mobileShift gap
    px(bgCtx, 0, h*0.65, w, h*0.35 + mobileShift, '#f48fb1');
    px(bgCtx, 0, h*0.92, w, h*0.08, '#e8789822');

    // floating hearts (above horizon only)
    const heartColors = ['#f06292','#e91e8c','#f8bbd0','#ff80ab','#f48fb1','#ff4081'];
    const hearts = [
      { sx:0.08, sy:0.12, sz:1,   ph:0.0  },
      { sx:0.22, sy:0.28, sz:1.5, ph:1.1  },
      { sx:0.38, sy:0.08, sz:0.8, ph:2.3  },
      { sx:0.55, sy:0.20, sz:1.2, ph:0.7  },
      { sx:0.70, sy:0.10, sz:1,   ph:1.8  },
      { sx:0.85, sy:0.30, sz:1.5, ph:0.4  },
      { sx:0.14, sy:0.50, sz:0.8, ph:3.1  },
      { sx:0.46, sy:0.42, sz:1,   ph:2.0  },
      { sx:0.62, sy:0.55, sz:1.2, ph:1.5  },
      { sx:0.90, sy:0.48, sz:0.8, ph:0.9  },
      { sx:0.30, sy:0.62, sz:1,   ph:2.7  },
      { sx:0.93, sy:0.15, sz:1.2, ph:2.1  },
    ];
    for (let i = 0; i < hearts.length; i++) {
      const ho = hearts[i];
      const bob = Math.sin(t * 0.9 + ho.ph) * p * 1.5;
      const hp = Math.max(3, Math.round(p * ho.sz));
      const hx = w * ho.sx - hp * 3.5;
      const hy = h * ho.sy + bob;
      drawHeart(bgCtx, hx, hy, hp, heartColors[i % heartColors.length]);
    }

    if (mobileShift) bgCtx.restore();
    return;
  }

  // ── horses background ─────────────────────────────────────────────────────
  const grad = bgCtx.createLinearGradient(0, mobileShift, 0, h*0.7 + mobileShift);
  grad.addColorStop(0, '#a4d8ee');
  grad.addColorStop(1, '#cdebf7');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, -mobileShift, w, h*0.7 + 2 * mobileShift);

  bgCtx.fillStyle = '#7ab85a';
  for (let x = 0; x < w; x += p*2) {
    const hh = (Math.sin(x*0.012) * 0.5 + 0.5) * p*4 + p*3;
    bgCtx.fillRect(x, h*0.55 - hh, p*2, hh + h*0.1);
  }
  px(bgCtx, 0, h*0.65, w, h*0.05, '#9ad06a');
  px(bgCtx, 0, h*0.70, w, h*0.30, '#5fa843');
  px(bgCtx, 0, h*0.95, w, h*0.05, '#7a5236');
  for (let x = 0; x < w; x += p*4) {
    const off = ((x*7919) % 13);
    px(bgCtx, x, h*0.65 - p, p, p, '#5fa843');
    px(bgCtx, x + p*2 + (off%3), h*0.65 - p, p, p, '#5fa843');
  }

  const fenceY = h * 0.58;
  px(bgCtx, 0, fenceY, w, p, '#6a4a2a');
  for (let x = p*4; x < w; x += p*8) {
    px(bgCtx, x, fenceY - p*2, p, p*5, '#6a4a2a');
  }
  const isMobile = window.innerWidth <= 480;
  const horses = [
    { x: isMobile ? w*0.04 : w*0.18, y: h*0.62, dark: false, ph: 0 },
    { x: w*0.78, y: h*0.61, dark: true,  ph: 2.4 },
  ];
  for (const ho of horses) {
    const bob = Math.sin(t*1.4 + ho.ph) > 0.6 ? p : 0;
    drawHorse(bgCtx, ho.x, ho.y + bob, p, ho.dark);
  }
  const pfc = ['#f7e030','#ffffff','#e8a0e0','#f4c842','#c8eaa0'];
  const pfs = isMobile ? [
    // mobile: left horse at 0.04, avoid dog at 0.50
    [0.12,0.78],[0.26,0.72],[0.38,0.78],[0.62,0.79],[0.85,0.78],
    [0.34,0.67],[0.62,0.67],
  ] : [
    // desktop/tablet: left horse at 0.18, right horse at 0.78 — avoid both
    [0.04,0.78],[0.36,0.78],[0.52,0.79],[0.64,0.72],[0.90,0.78],
    [0.06,0.68],[0.28,0.67],[0.48,0.68],[0.88,0.67],
  ];
  for (let i = 0; i < pfs.length; i++) {
    drawMomFlower(bgCtx, w*pfs[i][0], h*pfs[i][1] - p*5, p, pfc[i % pfc.length]);
  }
  if (mobileShift) bgCtx.restore();
}

// ── state machine ─────────────────────────────────────────────────────────

const stateOrder = ['sit','wag','tilt','alert','bounce','spin','sleep'];

const bgOrder = [
  { id: 'room',        label: 'Room' },
  { id: 'mothersday',  label: "Mother's Day" },
  { id: 'horses',      label: 'Horse pasture' },
];
const bgsEl = document.getElementById('bgs');

function setBg(name, fromReact) {
  bgMode = name;
  document.body.classList.toggle('mothersday', name === 'mothersday');
  document.body.classList.toggle('horses', name === 'horses');
  stage.classList.toggle('mothersday', name === 'mothersday');
  stage.classList.toggle('horses', name === 'horses');
  for (const b of bgsEl.querySelectorAll('.chip')) {
    b.classList.toggle('active', b.dataset.bg === name);
  }
  bgT0 = performance.now();
  if (!fromReact) window.dispatchEvent(new CustomEvent('bgmodechange', { detail: name }));
}
window._setBg = (name) => setBg(name, true);
for (const b of bgOrder) {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.dataset.bg = b.id;
  btn.textContent = b.label;
  btn.onclick = () => setBg(b.id);
  bgsEl.appendChild(btn);
}
setBg('room');
window.addEventListener('resize', () => { fitBg(); });

let current = 'sit';
let stateStart = performance.now();

const statesEl = document.getElementById('states');
const nowEl = document.getElementById('now');
const noteEl = document.getElementById('note');

function setState(name, fromReact) {
  current = name;
  stateStart = performance.now();
  for (const b of statesEl.querySelectorAll('.chip')) {
    b.classList.toggle('active', b.dataset.state === name);
  }
  if (nowEl) nowEl.textContent = STATES[name].label;
  if (noteEl) noteEl.textContent = STATES[name].note;
  if (!fromReact) window.dispatchEvent(new CustomEvent('dogstatechange', { detail: name }));
}
window._setDogState = (name) => setState(name, true);

for (const k of stateOrder) {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.dataset.state = k;
  btn.textContent = STATES[k].label;
  btn.onclick = () => setState(k);
  statesEl.appendChild(btn);
}
setState('sit');

// ── main loop ─────────────────────────────────────────────────────────────

function tick() {
  const now = performance.now();
  const energyMult = ({ chill: 0.55, normal: 1.0, zoomies: 1.75 })[window.tweaks?.energy] || 1;
  const t = ((now - stateStart) / 1000) * energyMult;

  drawBackground();

  const r = cv.getBoundingClientRect();
  ctx.clearRect(0, 0, r.width, r.height);

  const sc = Math.max(8, Math.min(22, Math.floor(Math.min(r.height, r.width) / 24)));
  const cx = r.width / 2;
  // On mobile the stage is shorter than the viewport, so 52% of stage floats
  // the dog above the background horizon. Anchor feet to 67% of viewport height
  // (just below the 65% horizon line shared by all backgrounds).
  const stageTop = stage.getBoundingClientRect().top;
  const footTarget = window.innerHeight * 0.57 - stageTop;
  const cyDefault = r.height * 0.52;
  const cy = (window.innerWidth <= 480 && footTarget - sc * H / 2 > 0)
    ? footTarget - sc * H / 2
    : cyDefault;

  const tr = STATES[current].play(t);

  const shadowSquish = (current === 'bounce')
    ? 1 - Math.min(1, Math.abs(tr.dy || 0) / 26) * 0.5
    : 1;
  drawShadow(cx, cy + sc * (H/2 - 1), sc, shadowSquish);

  drawSprite(tr.sprite, cx, cy, sc, tr);

  requestAnimationFrame(tick);
}
tick();

// ── tweaks button positioning ─────────────────────────────────────────────
const legendEl = document.getElementById('legend');

function updateTweaksBottom() {
  if (window.innerWidth > 480) return;
  const btn = document.querySelector('.twk-btn-trigger');
  if (btn && legendEl) btn.style.bottom = (legendEl.offsetHeight + 8) + 'px';
}
new MutationObserver(updateTweaksBottom)
  .observe(document.getElementById('tweaks-root'), { childList: true, subtree: true });
window.addEventListener('resize', updateTweaksBottom);
  </script>
